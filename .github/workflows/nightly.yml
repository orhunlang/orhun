name: Orhun Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  test-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      ORHUN_BENCH_GATE_P50: "1.4"
      ORHUN_BENCH_GATE_P90: "1.2"
      ORHUN_BENCH_GATE_MODE: "suite"
      ORHUN_CHANNEL: "nightly"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup C++ toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./tests/run_tests.ps1

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x tests/run_tests.sh
          ./tests/run_tests.sh

      - name: Benchmark smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./tests/benchmark.ps1 -Output orhun_bench.exe -Tekrar 5 -Warmup 3 -OlcumModu runtime -JsonCikti benchmark_results.jsonl

      - name: Benchmark gate (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./tests/benchmark_gate.ps1 -JsonL benchmark_results.jsonl -MinP50 $env:ORHUN_BENCH_GATE_P50 -MinP90 $env:ORHUN_BENCH_GATE_P90 -Mode $env:ORHUN_BENCH_GATE_MODE

      - name: Benchmark smoke (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x tests/benchmark.sh
          ./tests/benchmark.sh g++ orhun_bench 5 benchmark_results.jsonl "" 0 0 runtime 3

      - name: Benchmark gate (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x tests/benchmark_gate.sh
          ./tests/benchmark_gate.sh benchmark_results.jsonl "${ORHUN_BENCH_GATE_P50}" "${ORHUN_BENCH_GATE_P90}" "${ORHUN_BENCH_GATE_MODE}"

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ runner.os }}
          path: benchmark_results.jsonl
